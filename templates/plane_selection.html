{% from "bootstrap5/form.html" import render_form %}
{% extends "base.html" %} {% block content %}

<div class="custom-main">
<h3>Which plane are you flying?</h3>
<div class="list-group">
    {% for plane in planes %}
    <a href='/plane_data/{{ plane.id }}' class="list-group-item list-group-item-action">{{ plane.name }}</a>
    {% endfor %}
    <a href="/add_plane" style="text-align:center;" class="btn-link list-group-item">Add plane</a>
</div>
</div>
{% endblock %}
