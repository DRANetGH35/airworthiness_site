{% from "bootstrap5/form.html" import render_form %}
{% extends "base.html" %} {% block content %}
{% include 'navbar.html' %}
<div class="custom-body">

<form action="/add_plane" method="POST" style="display:flex; flex-direction: column; align-content:center;">
    <label>Tail number
        <input class="form-control" type="text" name="plane">
    </label>
    <label>Tach hours on aircraft
        <input class="form-control" type="number" name="aircraft-hours">
    </label>
    <label>Tach hours on engine
        <input class="form-control" type="number" name="engine-hours">
    </label>
    <label>Tach hours since last overhaul
        <input class="form-control" type="number" name="overhaul-hours">
    </label>
    <input class="btn btn-primary" type="submit">
</form>
<p class="error">{{error}}</p>

</div>

{% include 'footer.html' %}
{% endblock %}
